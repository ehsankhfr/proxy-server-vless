services:
  # V2Ray server: VLESS inbound on port 10000, freedom outbound
  # Matches the v2ray config written by EC2 user-data
  v2ray-server:
    image: v2fly/v2fly-core:v5.41.0
    volumes:
      - ./server-v2ray-config.json:/etc/v2ray/config.json:ro
    networks:
      - vless-net

  # Nginx: mirrors the EC2 setup – health check on / and WS proxy on /vless-fallback → v2ray-server:10000
  nginx-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18080:80"
    networks:
      - vless-net
    depends_on:
      - v2ray-server

  # Minimal target HTTP server reachable only via the v2ray-server's freedom outbound
  target:
    image: nginx:1.27-alpine
    volumes:
      - ./target.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vless-net

  # Correct VLESS client: SOCKS5 on 1080 → VLESS over WS → nginx-proxy:80
  v2ray-client:
    image: v2fly/v2fly-core:v5.41.0
    volumes:
      - ./client-v2ray-config.json:/etc/v2ray/config.json:ro
    ports:
      - "11080:1080"
    networks:
      - vless-net
    depends_on:
      - nginx-proxy

  # Failure-path client: wrong UUID – VLESS authentication should be rejected
  wrong-uuid-client:
    image: v2fly/v2fly-core:v5.41.0
    volumes:
      - ./wrong-uuid-client-config.json:/etc/v2ray/config.json:ro
    ports:
      - "11081:1080"
    networks:
      - vless-net
    depends_on:
      - nginx-proxy

  # Failure-path client: wrong WS path – nginx routes it to the plain / handler, not v2ray
  wrong-path-client:
    image: v2fly/v2fly-core:v5.41.0
    volumes:
      - ./wrong-path-client-config.json:/etc/v2ray/config.json:ro
    ports:
      - "11082:1080"
    networks:
      - vless-net
    depends_on:
      - nginx-proxy

networks:
  vless-net:
    driver: bridge
