name: Deploy VLESS Proxy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with AWS

jobs:
  deploy:
    name: Build, Test & CDK Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Preferred: OIDC role-based auth (no long-lived secrets).
          # Create an IAM role with a GitHub OIDC trust policy and store its ARN
          # in the AWS_ROLE_ARN repository secret.
          role-to-assume: arn:aws:iam::702899346695:role/GitHubActions-ehsankhfr-proxy-server-vless
          aws-region: eu-west-1
          role-session-name: GitHubActions
          output-env-credentials: true

      - name: Bootstrap CDK
        run: npx cdk bootstrap aws://702899346695/eu-west-1

      - name: Deploy stack
        run: npx cdk deploy ProxyServerVlessStack --require-approval never
