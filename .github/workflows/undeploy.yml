name: Undeploy VLESS Proxy

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication with AWS

jobs:
  undeploy:
    name: CDK Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::702899346695:role/GitHubActions-ehsankhfr-java-tutorial-with-tdd
          aws-region: eu-west-1

      - name: Destroy stack
        run: npx cdk destroy ProxyServerVlessStack --force
